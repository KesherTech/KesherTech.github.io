<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SummerJob — ניהול</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d0d;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
a{color:inherit;text-decoration:none}

/* ── login ── */
#login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:#111;border:1px solid #1e2235;border-radius:16px;padding:40px;width:100%;max-width:380px}
.login-box h1{font-size:1.3rem;font-weight:700;margin-bottom:6px;color:#fff}
.login-box p{font-size:.82rem;color:#64748b;margin-bottom:28px}
.login-err{color:#ef4444;font-size:.8rem;margin-top:10px;display:none}

/* ── form controls ── */
label{display:block;font-size:.72rem;text-transform:uppercase;letter-spacing:.8px;color:#475569;margin-bottom:5px;margin-top:14px}
input,select,textarea{width:100%;background:#1a1f33;border:1px solid #2d3657;border-radius:8px;padding:10px 12px;color:#e2e8f0;font-size:.88rem;font-family:inherit;outline:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:#6366f1}
textarea{resize:vertical;min-height:90px;line-height:1.5}
select option{background:#1a1f33}

/* ── buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;border:none;font-size:.85rem;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn:disabled{opacity:.4;cursor:default}
.btn-primary{background:#6366f1;color:#fff}
.btn-green{background:#22c55e;color:#fff}
.btn-red{background:#ef4444;color:#fff;padding:5px 11px;font-size:.78rem}
.btn-yellow{background:#f59e0b;color:#000;padding:5px 11px;font-size:.78rem}
.btn-sm{padding:5px 11px;font-size:.78rem}
.btn:hover:not(:disabled){opacity:.85}

/* ── layout ── */
#admin-wrap{display:none;max-width:1100px;margin:0 auto;padding:24px 20px}
header.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid #1e2235}
header.top h1{font-size:1.2rem;font-weight:700;color:#fff}
.user-badge{font-size:.78rem;color:#64748b;display:flex;align-items:center;gap:12px}

/* ── stats ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.stat-card{background:#111;border:1px solid #1e2235;border-radius:12px;padding:16px 18px}
.stat-card .num{font-size:2rem;font-weight:800;color:#f1f5f9;line-height:1}
.stat-card .lbl{font-size:.7rem;color:#64748b;margin-top:4px;text-transform:uppercase;letter-spacing:.7px}
.stat-card.warn .num{color:#f59e0b}
.stat-card.danger .num{color:#ef4444}

/* ── panels ── */
.panel{background:#111;border:1px solid #1e2235;border-radius:14px;padding:22px;margin-bottom:22px}
.panel h2{font-size:.95rem;font-weight:700;color:#fff;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid #1e2235}

/* ── post form ── */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-row.three{grid-template-columns:1fr 1fr 1fr}
.checkbox-row{display:flex;align-items:center;gap:8px;margin-top:16px}
.checkbox-row input[type=checkbox]{width:16px;height:16px;accent-color:#6366f1;flex-shrink:0}
.checkbox-row label{margin:0;font-size:.85rem;text-transform:none;letter-spacing:0;color:#cbd5e1;cursor:pointer}
.form-actions{display:flex;align-items:center;gap:12px;margin-top:18px}
.post-msg{font-size:.82rem;display:none}
.post-msg.ok{color:#22c55e}
.post-msg.err{color:#ef4444}

/* ── jobs table ── */
.jobs-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.filter-btns{display:flex;gap:6px}
.filter-btn{background:#1a1f33;border:1px solid #2d3657;border-radius:6px;padding:5px 12px;font-size:.78rem;color:#94a3b8;cursor:pointer;transition:all .15s}
.filter-btn.active{background:#6366f1;border-color:#6366f1;color:#fff}
.search-box{flex:1;min-width:160px}
.search-box input{padding:7px 12px;font-size:.8rem}

table{width:100%;border-collapse:collapse;font-size:.82rem}
th{text-align:right;padding:8px 10px;color:#475569;font-weight:600;font-size:.72rem;text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid #1e2235}
td{padding:10px 10px;border-bottom:1px solid #161b2e;vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:#0f1220}
.job-title{color:#f1f5f9;font-weight:600;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.job-city{color:#6366f1;font-size:.78rem}
.job-desc{color:#94a3b8;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.job-contact{font-size:.78rem;color:#64748b}
.badge{display:inline-block;border-radius:4px;padding:2px 7px;font-size:.68rem;font-weight:700}
.badge-green{background:#14532d;color:#4ade80}
.badge-red{background:#450a0a;color:#f87171}
.badge-yellow{background:#451a03;color:#fbbf24}
.badge-purple{background:#2e1065;color:#a78bfa}
.actions{display:flex;gap:6px;flex-wrap:wrap}

.empty{text-align:center;padding:40px;color:#475569;font-size:.88rem}
.loading{text-align:center;padding:30px;color:#475569}

@media(max-width:640px){
  .stats-row{grid-template-columns:1fr 1fr}
  .form-row,.form-row.three{grid-template-columns:1fr}
  table{font-size:.75rem}
  .job-desc{display:none}
}
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-wrap">
  <div class="login-box">
    <h1>SummerJob Admin</h1>
    <p>כניסה למנהלים בלבד</p>
    <label for="email">אימייל</label>
    <input id="email" type="email" placeholder="admin@example.com" autocomplete="username">
    <label for="pass" style="margin-top:12px">סיסמה</label>
    <input id="pass" type="password" placeholder="••••••••" autocomplete="current-password">
    <div class="login-err" id="login-err"></div>
    <div style="margin-top:20px">
      <button class="btn btn-primary" id="login-btn" onclick="doLogin()" style="width:100%">כניסה</button>
    </div>
  </div>
</div>

<!-- ── ADMIN PANEL ── -->
<div id="admin-wrap">

  <header class="top">
    <h1>🛠 SummerJob — ניהול</h1>
    <div class="user-badge">
      <span id="user-email-label"></span>
      <button class="btn btn-sm" style="background:#1a1f33;border:1px solid #2d3657;color:#94a3b8" onclick="doLogout()">יציאה</button>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats-row" id="stats-row">
    <div class="stat-card"><div class="num" id="s-live">—</div><div class="lbl">משרות פעילות</div></div>
    <div class="stat-card warn"><div class="num" id="s-reported">—</div><div class="lbl">דווחו</div></div>
    <div class="stat-card"><div class="num" id="s-hidden">—</div><div class="lbl">מוסתרות</div></div>
    <div class="stat-card warn"><div class="num" id="s-expiring">—</div><div class="lbl">פגות ב-3 ימים</div></div>
  </div>

  <!-- Post Job -->
  <div class="panel">
    <h2>פרסום משרה חדשה (ללא הגבלת קצב)</h2>
    <div class="form-row">
      <div>
        <label for="f-title">כותרת המשרה</label>
        <input id="f-title" type="text" placeholder="מדריך קייטנה, מלצר/ית...">
      </div>
      <div>
        <label for="f-city">עיר</label>
        <input id="f-city" type="text" placeholder="תל אביב, חיפה...">
      </div>
    </div>
    <label for="f-desc">תיאור</label>
    <textarea id="f-desc" placeholder="פרטי המשרה, שעות, תנאים..."></textarea>
    <div class="form-row three" style="margin-top:4px">
      <div>
        <label for="f-ctype">אמצעי קשר</label>
        <select id="f-ctype">
          <option value="phone">טלפון</option>
          <option value="whatsapp">וואטסאפ</option>
        </select>
      </div>
      <div>
        <label for="f-cval">מספר טלפון</label>
        <input id="f-cval" type="tel" placeholder="05XXXXXXXX">
      </div>
      <div>
        <label for="f-days">תוקף (ימים)</label>
        <input id="f-days" type="number" value="30" min="1" max="365">
      </div>
    </div>
    <div class="checkbox-row">
      <input id="f-sponsored" type="checkbox">
      <label for="f-sponsored">ממומן (מופיע ראשון בלוח)</label>
    </div>
    <div class="form-actions">
      <button class="btn btn-green" id="post-btn" onclick="postJob()">פרסם משרה</button>
      <span class="post-msg" id="post-msg"></span>
    </div>
  </div>

  <!-- Jobs List -->
  <div class="panel">
    <h2>כל המשרות</h2>
    <div class="jobs-toolbar">
      <div class="filter-btns">
        <button class="filter-btn active" onclick="setFilter('live',this)">פעילות</button>
        <button class="filter-btn" onclick="setFilter('hidden',this)">מוסתרות</button>
        <button class="filter-btn" onclick="setFilter('all',this)">הכל</button>
      </div>
      <div class="search-box">
        <input type="text" id="search-input" placeholder="חיפוש לפי עיר / כותרת..." oninput="renderJobs()">
      </div>
      <button class="btn btn-sm" style="background:#1a1f33;border:1px solid #2d3657;color:#94a3b8" onclick="loadJobs()">רענן</button>
    </div>
    <div id="jobs-container"><div class="loading">טוען...</div></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPABASE_URL  = 'https://anctphhidbbampvbjsxh.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFuY3RwaGhpZGJiYW1wdmJqc3hoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5Njk2MjEsImV4cCI6MjA5NzU0NTYyMX0.Ihy8aAY3hbnAbtKxhDKRZywBFItxN8pSvQZMoTNk4R0';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

let allJobs = [];
let currentFilter = 'live';

// ── auth ──────────────────────────────────────────────────────────────────────

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('pass').value;
  const errEl = document.getElementById('login-err');
  const btn   = document.getElementById('login-btn');
  errEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'מתחבר...';

  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) {
    errEl.textContent = 'אימייל או סיסמה שגויים';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'כניסה';
    return;
  }

  const { data: adminCheck } = await sb.rpc('is_admin');
  if (!adminCheck) {
    await sb.auth.signOut();
    errEl.textContent = 'אין לך הרשאות מנהל';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'כניסה';
    return;
  }

  showAdmin();
}

document.getElementById('pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogout() {
  await sb.auth.signOut();
  location.reload();
}

async function showAdmin() {
  const { data: { user } } = await sb.auth.getUser();
  document.getElementById('user-email-label').textContent = user?.email ?? '';
  document.getElementById('login-wrap').style.display = 'none';
  document.getElementById('admin-wrap').style.display = 'block';
  loadStats();
  loadJobs();
}

// Check existing session on load
sb.auth.getSession().then(async ({ data: { session } }) => {
  if (!session) return;
  const { data: adminCheck } = await sb.rpc('is_admin');
  if (adminCheck) showAdmin();
});

// ── stats ─────────────────────────────────────────────────────────────────────

async function loadStats() {
  const { data } = await sb.rpc('admin_overview');
  if (!data) return;
  document.getElementById('s-live').textContent     = data.live     ?? '—';
  document.getElementById('s-reported').textContent = data.reported ?? '—';
  document.getElementById('s-hidden').textContent   = data.hidden   ?? '—';
  document.getElementById('s-expiring').textContent = data.expiring_soon ?? '—';
}

// ── post job ──────────────────────────────────────────────────────────────────

async function postJob() {
  const title    = document.getElementById('f-title').value.trim();
  const city     = document.getElementById('f-city').value.trim();
  const desc     = document.getElementById('f-desc').value.trim();
  const ctype    = document.getElementById('f-ctype').value;
  const cval     = document.getElementById('f-cval').value.replace(/\D/g,'');
  const days     = parseInt(document.getElementById('f-days').value) || 30;
  const sponsored = document.getElementById('f-sponsored').checked;
  const msgEl    = document.getElementById('post-msg');
  const btn      = document.getElementById('post-btn');

  msgEl.style.display = 'none';
  if (!title || !city || !desc || !cval) {
    showMsg('אנא מלא את כל השדות', 'err'); return;
  }
  if (!/^05\d{8}$/.test(cval)) {
    showMsg('מספר טלפון לא תקין (05XXXXXXXX)', 'err'); return;
  }

  btn.disabled = true;
  btn.textContent = 'מפרסם...';

  const { error } = await sb.rpc('admin_post_job', {
    p_title:        title,
    p_city:         city,
    p_description:  desc,
    p_contact_type: ctype,
    p_contact_value: cval,
    p_sponsored:    sponsored,
    p_expires_days: days,
  });

  btn.disabled = false;
  btn.textContent = 'פרסם משרה';

  if (error) {
    showMsg('שגיאה: ' + error.message, 'err');
  } else {
    showMsg('✓ המשרה פורסמה בהצלחה!', 'ok');
    document.getElementById('f-title').value = '';
    document.getElementById('f-city').value  = '';
    document.getElementById('f-desc').value  = '';
    document.getElementById('f-cval').value  = '';
    document.getElementById('f-sponsored').checked = false;
    loadStats();
    loadJobs();
  }
}

function showMsg(text, type) {
  const el = document.getElementById('post-msg');
  el.textContent = text;
  el.className = 'post-msg ' + type;
  el.style.display = 'inline';
  setTimeout(() => { el.style.display = 'none'; }, 5000);
}

// ── jobs list ─────────────────────────────────────────────────────────────────

async function loadJobs() {
  document.getElementById('jobs-container').innerHTML = '<div class="loading">טוען...</div>';
  const { data, error } = await sb
    .from('jobs')
    .select('*')
    .order('created_at', { ascending: false })
    .limit(200);
  if (error) {
    document.getElementById('jobs-container').innerHTML = '<div class="empty">שגיאה בטעינה</div>';
    return;
  }
  allJobs = data ?? [];
  renderJobs();
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderJobs();
}

function renderJobs() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  let jobs = allJobs;

  if (currentFilter === 'live')   jobs = jobs.filter(j => !j.hidden && new Date(j.expires_at) > new Date());
  if (currentFilter === 'hidden') jobs = jobs.filter(j => j.hidden);
  if (q) jobs = jobs.filter(j =>
    j.title.toLowerCase().includes(q) || j.city.toLowerCase().includes(q)
  );

  if (!jobs.length) {
    document.getElementById('jobs-container').innerHTML = '<div class="empty">אין משרות להציג</div>';
    return;
  }

  const rows = jobs.map(j => {
    const expired = new Date(j.expires_at) < new Date();
    const statusBadge = j.hidden
      ? '<span class="badge badge-red">מוסתר</span>'
      : expired
        ? '<span class="badge badge-yellow">פג תוקף</span>'
        : '<span class="badge badge-green">פעיל</span>';
    const sponsBadge = j.sponsored ? ' <span class="badge badge-purple">ממומן</span>' : '';
    const reported   = j.report_count > 0 ? ` <span class="badge badge-yellow">${j.report_count} דיווחים</span>` : '';

    const hideBtn = j.hidden
      ? `<button class="btn btn-yellow" onclick="toggleHide('${j.id}',false)">הצג</button>`
      : `<button class="btn btn-yellow" onclick="toggleHide('${j.id}',true)">הסתר</button>`;

    const created = new Date(j.created_at).toLocaleDateString('he-IL');

    return `<tr>
      <td>
        <div class="job-title" title="${esc(j.title)}">${esc(j.title)}</div>
        <div class="job-city">${esc(j.city)}</div>
      </td>
      <td><div class="job-desc" title="${esc(j.description)}">${esc(j.description)}</div></td>
      <td><div class="job-contact">${j.contact_type === 'whatsapp' ? '📱' : '📞'} ${esc(j.contact_value)}</div></td>
      <td>${statusBadge}${sponsBadge}${reported}</td>
      <td style="color:#475569;font-size:.75rem;white-space:nowrap">${created}</td>
      <td>
        <div class="actions">
          ${hideBtn}
          <button class="btn btn-red" onclick="deleteJob('${j.id}')">מחק</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('jobs-container').innerHTML = `
    <table>
      <thead><tr>
        <th>כותרת / עיר</th>
        <th>תיאור</th>
        <th>קשר</th>
        <th>סטטוס</th>
        <th>תאריך</th>
        <th>פעולות</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

async function toggleHide(id, hide) {
  const { error } = await sb.from('jobs').update({ hidden: hide }).eq('id', id);
  if (!error) { loadStats(); loadJobs(); }
}

async function deleteJob(id) {
  if (!confirm('למחוק את המשרה לצמיתות?')) return;
  const { error } = await sb.from('jobs').delete().eq('id', id);
  if (!error) { loadStats(); loadJobs(); }
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
